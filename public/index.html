<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cross Network File Transfer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <!-- <link rel="icon" href="/assets/favicon.png?v=1"> -->

  <!-- Favicon -->
  <link rel="icon" href="/assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">

  <!-- Apple (iPhone home screen) -->
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">



<body>
  <div class="blob-c">
    <div class="shape blob1"></div>
    <div class="shape blob2"></div>
  </div>


  <div class="container">
    <header>
      <div class="logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 17a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9.5C2 7 4 5 6.5 5H18c2.2 0 4 1.8 4 4v8Z"></path>
          <polyline points="15,9 18,9 18,11"></polyline>
          <path d="M6.5 5C9 5 11 7 11 9.5V17a2 2 0 0 1-2 2v0"></path>
          <line x1="6" y1="10" x2="6" y2="10"></line>
        </svg>
        <h1>Cross Network</h1>
      </div>
      <p>Secure, fast, and simple peer-to-peer file transfer</p>
    </header>

    <main class="panels">
      <!-- Send Panel -->
      <div class="panel send-panel">
        <div class="panel-header">
          <h2>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            Send File
          </h2>
        </div>
        <div class="file-upload-wrapper" id="dropZone">
          <input type="file" id="fileInput" class="file-input" />
          <div class="file-upload-ui">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <circle cx="8.5" cy="8.5" r="1.5"></circle>
              <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            <span class="file-label">Drag &amp; drop a file here, or click to browse</span>
            <span class="drop-hint">Drop file here!</span>
            <span class="file-name" id="fileNameDisplay"></span>
          </div>
        </div>
        <button class="primary-btn" onclick="createSession()" id="sendBtn">
          Generate Share Code
        </button>
        <div class="code-container" id="codeContainer" style="display: none">
          <p class="code-label">Your Share Code:</p>
          <div class="code-display" id="codeDisplay"></div>
          <div id="qrcode" class="qr-code"></div>
          <div id="expiryTimer" class="expiry-timer" style="display: none">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            Code expires in <span class="expiry-countdown">02:00</span>
          </div>
          <p class="status-msg" id="sendStatus">Waiting for receiver...</p>
        </div>
      </div>

      <div class="divider">
        <span>OR</span>
      </div>

      <!-- Receive Panel -->
      <div class="panel receive-panel">
        <div class="panel-header">
          <h2>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Receive File
          </h2>
        </div>
        <div class="input-wrapper">
          <input type="text" id="joinCode" class="join-input" placeholder="Enter share code here" autocomplete="off" />
        </div>
        <button class="primary-btn receive-btn" onclick="joinSession()" id="receiveBtn">
          Connect & Receive
        </button>
        <div id="incomingFileInfo" class="incoming-file-info" style="display: none">
          <div class="file-details">
            <span id="incomingFileName" class="incoming-file-name"></span>
            <span id="incomingFileSize" class="incoming-file-size"></span>
          </div>
          <div class="progress-bar">
            <div id="progressBarInner" class="progress-bar-inner"></div>
          </div>
        </div>
        <div id="downloadContainer" class="download-container" style="display: none">
          <a id="downloadLink" class="download-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Download File
          </a>
        </div>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="script.js"></script>
</body>

</html>
